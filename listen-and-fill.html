<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordCraft — Listen and Fill</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/practice/results.css" />
  <link rel="stylesheet" href="css/listen-and-fill/layout.css" />
  <link rel="stylesheet" href="css/listen-and-fill/practice.css" />
  <link rel="stylesheet" href="css/streak.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body class="lf-page">

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="topics.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        WordCraft
      </a>
      <div class="navbar-spacer"></div>
      <div class="navbar-right">
        <span id="navbar-streak" class="navbar-streak" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 16c3.314 0 6-2 6-5.5 0-1.5-.5-4-2.5-6 .25 1.5-1.25 2-1.25 2C11 4 9 .5 8 0 7.5 2 5.5 4 4.75 4.75 4.75 4.75 3.25 4.25 3.5 2.75 1.5 4.75 1 7.25 1 8.75 1 12.25 4.686 16 8 16zm0-1c-1.657 0-3-1-3-2.75 0-.75.25-2 1.25-3 .125.75 1 1.25 1 1.25S8 9 8 8c.5 1 1.5 2 2 3 .75.75 1 1.5 1 2.25C11 14 9.657 15 8 15z"/>
          </svg>
          <span id="navbar-streak-count">0</span>
        </span>
        <div class="navbar-user-info">
          <span class="navbar-avatar" id="nav-avatar"></span>
          <span class="navbar-username" id="nav-username"></span>
        </div>
        <div class="navbar-vdivider"></div>
        <button id="btn-logout" class="btn-signout">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== Main Content ===== -->
  <main class="container">

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="topics.html">My Topics</a>
      <span class="breadcrumb-separator">›</span>
      <span>Listen and Fill</span>
    </div>

    <!-- Header -->
    <div class="detail-header">
      <h2 class="detail-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="lf-header-icon">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
        </svg>
        Listen and Fill
        <span class="detail-word-badge hidden" id="lf-passage-badge"></span>
      </h2>
    </div>

    <!-- ===== Setup Screen ===== -->
    <section id="lf-setup" class="lf-setup">
      <p class="lf-setup-intro">
        Listen to an AI-generated passage and type the missing words. Choose your level and a topic, or let AI surprise you.
      </p>

      <!-- Level -->
      <div class="lf-field">
        <label class="form-label lf-field-label">Level</label>
        <div class="lf-chip-group" id="lf-level-group" role="radiogroup" aria-label="CEFR level">
          <button type="button" class="lf-chip" data-level="A1" role="radio" aria-checked="false">A1</button>
          <button type="button" class="lf-chip active" data-level="A2" role="radio" aria-checked="true">A2</button>
          <button type="button" class="lf-chip" data-level="B1" role="radio" aria-checked="false">B1</button>
          <button type="button" class="lf-chip" data-level="B2" role="radio" aria-checked="false">B2</button>
          <button type="button" class="lf-chip" data-level="C1" role="radio" aria-checked="false">C1</button>
          <button type="button" class="lf-chip" data-level="C2" role="radio" aria-checked="false">C2</button>
        </div>
      </div>

      <!-- Topic -->
      <div class="lf-field">
        <label class="form-label lf-field-label">Topic</label>
        <div class="lf-chip-group" id="lf-topic-group" aria-label="Topic suggestions">
          <button type="button" class="lf-chip lf-chip-topic active" data-topic="" data-topic-key="random" aria-pressed="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
            Surprise me
          </button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Daily Life" aria-pressed="false">Daily Life</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Travel" aria-pressed="false">Travel</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Food" aria-pressed="false">Food</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Technology" aria-pressed="false">Technology</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Health" aria-pressed="false">Health</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Environment" aria-pressed="false">Environment</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Business" aria-pressed="false">Business</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Hobbies" aria-pressed="false">Hobbies</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Education" aria-pressed="false">Education</button>
          <button type="button" class="lf-chip lf-chip-topic" data-topic="Nature" aria-pressed="false">Nature</button>
        </div>
        <input
          type="text"
          id="lf-custom-topic"
          class="form-input lf-custom-topic"
          placeholder="Or type your own topic / description…"
          maxlength="120"
          autocomplete="off"
        />
      </div>

      <!-- Length -->
      <div class="lf-field">
        <label class="form-label lf-field-label">Length</label>
        <div class="lf-chip-group" id="lf-length-group" role="radiogroup" aria-label="Passage length">
          <button type="button" class="lf-chip" data-length="short" role="radio" aria-checked="false">Short</button>
          <button type="button" class="lf-chip active" data-length="medium" role="radio" aria-checked="true">Medium</button>
          <button type="button" class="lf-chip" data-length="long" role="radio" aria-checked="false">Long</button>
        </div>
      </div>

      <div class="lf-setup-actions">
        <button id="lf-btn-start" class="btn btn-primary btn-lg">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Generate Passage
        </button>
      </div>
    </section>

    <!-- ===== Loading ===== -->
    <section id="lf-loading" class="lf-loading hidden">
      <div class="spinner spinner-lg"></div>
      <span class="ai-loading-text">AI is composing your passage…</span>
    </section>

    <!-- ===== Practice Screen ===== -->
    <section id="lf-practice" class="lf-practice hidden">

      <!-- Stats bar -->
      <div class="stats-bar lf-stats-bar">
        <div class="stat"><strong id="lf-stat-level">A2</strong> level</div>
        <div class="stat lf-stat-topic">Topic: <strong id="lf-stat-topic">—</strong></div>
        <div class="stat"><strong id="lf-stat-blanks">0</strong> blanks</div>
      </div>

      <!-- Controls -->
      <div class="lf-controls">
        <button id="lf-btn-play" class="btn btn-primary lf-btn-play" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          Play Full
          <kbd class="lf-kbd">R</kbd>
        </button>

        <div class="lf-speed-control">
          <label for="lf-speed">Speed</label>
          <select id="lf-speed" class="form-select lf-speed-select">
            <option value="0.75">0.75×</option>
            <option value="0.9" selected>1×</option>
            <option value="1.1">1.25×</option>
          </select>
        </div>

        <button id="lf-btn-restart" class="btn btn-ghost btn-sm" type="button" title="Generate a new passage">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          New Passage
        </button>
      </div>

      <!-- Passage with inline blanks -->
      <div class="lf-passage-card">
        <h3 class="lf-passage-title" id="lf-passage-title">—</h3>
        <div class="lf-passage" id="lf-passage"></div>
      </div>

      <!-- Action row -->
      <div class="lf-action-row">
        <button id="lf-btn-check" class="btn btn-primary btn-lg" type="button">
          Check Answers
          <kbd class="lf-kbd">Ctrl+Enter</kbd>
        </button>
      </div>
    </section>

    <!-- ===== Result Screen ===== -->
    <section id="lf-result" class="lf-result hidden">
      <div id="lf-result-summary"></div>

      <div class="lf-passage-card lf-passage-card-review">
        <h3 class="lf-passage-title" id="lf-result-title">—</h3>
        <div class="lf-passage lf-passage-review" id="lf-result-passage"></div>
      </div>

      <div class="lf-action-row lf-result-actions-row">
        <button id="lf-btn-retry" class="btn btn-ghost" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Retry Same Passage
        </button>
        <button id="lf-btn-new" class="btn btn-primary" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
          Generate New Passage
        </button>
      </div>
    </section>

  </main>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- ===== App Script ===== -->
  <script type="module" src="js/pages/listen-and-fill-page.js"></script>
</body>
</html>
