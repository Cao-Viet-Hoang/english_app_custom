<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordCraft — Reading Practice</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/reading.css" />
  <link rel="stylesheet" href="css/streak.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body class="reading-page">

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="topics.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        WordCraft
      </a>
      <div class="navbar-spacer"></div>
      <div class="navbar-right">
        <span id="navbar-streak" class="navbar-streak" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 16c3.314 0 6-2 6-5.5 0-1.5-.5-4-2.5-6 .25 1.5-1.25 2-1.25 2C11 4 9 .5 8 0 7.5 2 5.5 4 4.75 4.75 4.75 4.75 3.25 4.25 3.5 2.75 1.5 4.75 1 7.25 1 8.75 1 12.25 4.686 16 8 16zm0-1c-1.657 0-3-1-3-2.75 0-.75.25-2 1.25-3 .125.75 1 1.25 1 1.25S8 9 8 8c.5 1 1.5 2 2 3 .75.75 1 1.5 1 2.25C11 14 9.657 15 8 15z"/>
          </svg>
          <span id="navbar-streak-count">0</span>
        </span>
        <div class="navbar-user-info">
          <span class="navbar-avatar" id="nav-avatar"></span>
          <span class="navbar-username" id="nav-username"></span>
        </div>
        <div class="navbar-vdivider"></div>
        <button id="btn-logout" class="btn-signout">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== Main Content ===== -->
  <main class="container">

    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <a href="topics.html">My Topics</a>
      <span class="breadcrumb-separator">&rsaquo;</span>
      <a href="#" id="breadcrumb-topic-link">Loading&hellip;</a>
      <span class="breadcrumb-separator">&rsaquo;</span>
      <span>Reading</span>
    </div>

    <!-- Header -->
    <div class="detail-header">
      <h2 class="detail-title">
        <span>Reading Practice</span>
        <span class="detail-word-badge" id="detail-word-badge"></span>
      </h2>
    </div>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="comprehension">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        Comprehension
      </button>
      <button class="mode-btn" data-mode="truefalse">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        True / False
      </button>
    </div>

    <!-- Empty state -->
    <div id="practice-empty" class="practice-empty hidden">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <h3>Not Enough Words</h3>
      <p>Add at least 4 vocabulary words to start reading practice.</p>
      <br/>
      <a id="link-back-detail" href="#" class="btn btn-primary">Go to Topic</a>
    </div>

    <!-- Loading -->
    <div id="practice-loading" class="text-center" style="padding:var(--sp-7)">
      <div class="spinner spinner-lg"></div>
    </div>

    <!-- ============ COMPREHENSION MODE ============ -->
    <div id="panel-comprehension" class="practice-panel">
      <div id="rc-loading" class="ai-loading">
        <div class="spinner spinner-lg"></div>
        <span class="ai-loading-text">Generating reading passage...</span>
      </div>

      <div id="rc-content" style="display:none">
        <div class="reading-split">
          <div class="reading-split-passage">
            <div class="reading-passage-card">
              <div class="reading-passage-text" id="rc-passage"></div>
            </div>
          </div>
          <div class="reading-split-questions">
            <div class="reading-questions" id="rc-questions"></div>

            <div class="reading-actions" id="rc-action-row">
              <button class="btn btn-primary" id="rc-btn-check" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Check Answers
              </button>
            </div>

            <div class="reading-actions" id="rc-done-row" style="display:none">
              <button class="btn btn-primary" id="rc-btn-new">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                New Passage
              </button>
              <a class="btn btn-ghost" id="rc-btn-back" href="#">Back to Topic</a>
            </div>
          </div>
        </div>
      </div>

      <div id="rc-result" class="practice-result hidden"></div>
    </div>

    <!-- ============ TRUE/FALSE MODE ============ -->
    <div id="panel-truefalse" class="practice-panel">
      <div id="tf-loading" class="ai-loading">
        <div class="spinner spinner-lg"></div>
        <span class="ai-loading-text">Generating reading passage...</span>
      </div>

      <div id="tf-content" style="display:none">
        <div class="reading-split">
          <div class="reading-split-passage">
            <div class="reading-passage-card">
              <div class="reading-passage-text" id="tf-passage"></div>
            </div>
          </div>
          <div class="reading-split-questions">
            <div class="tf-statements" id="tf-statements"></div>

            <div class="reading-actions" id="tf-action-row">
              <button class="btn btn-primary" id="tf-btn-check" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                Check Answers
              </button>
            </div>

            <div class="reading-actions" id="tf-done-row" style="display:none">
              <button class="btn btn-primary" id="tf-btn-new">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                New Passage
              </button>
              <a class="btn btn-ghost" id="tf-btn-back" href="#">Back to Topic</a>
            </div>
          </div>
        </div>
      </div>

      <div id="tf-result" class="practice-result hidden"></div>
    </div>

  </main>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- ===== App Script ===== -->
  <script type="module" src="js/pages/reading-page.js"></script>
</body>
</html>
