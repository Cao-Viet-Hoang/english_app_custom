<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordCraft — My Topics</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/topics.css" />
  <link rel="stylesheet" href="css/streak.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body class="topics-page">

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a class="navbar-brand" href="topics.html">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        WordCraft
      </a>
      <div class="navbar-spacer"></div>
      <div class="navbar-right">
        <div class="navbar-user-info">
          <span class="navbar-avatar" id="nav-avatar"></span>
          <span class="navbar-username" id="nav-username"></span>
        </div>
        <div class="navbar-vdivider"></div>
        <button id="btn-logout" class="btn-signout">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== Activity Log Modal ===== -->
  <div id="modal-activity-log" class="modal-overlay">
    <div class="modal activity-log-modal">
      <div class="modal-header">
        <h3>Activity Log</h3>
        <button class="btn-icon" data-close-modal aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div id="activity-log-stats" class="activity-log-stats"></div>
      <div class="modal-body">
        <div id="activity-log-body" class="activity-log-body">
          <div class="text-center" style="padding:var(--sp-6)"><div class="spinner"></div></div>
        </div>
        <div class="activity-log-footer">
          <div class="activity-legend">
            <span class="activity-legend-item"><span class="activity-legend-swatch" style="background:var(--color-surface-alt)"></span> None</span>
            <span class="activity-legend-item"><span class="activity-legend-swatch" style="background:rgba(130,201,161,0.3)"></span> 1</span>
            <span class="activity-legend-item"><span class="activity-legend-swatch" style="background:rgba(130,201,161,0.6)"></span> 2-4</span>
            <span class="activity-legend-item"><span class="activity-legend-swatch" style="background:var(--color-success)"></span> 5+</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Main Content ===== -->
  <main class="container topics-container">
    <!-- Header -->
    <div class="topics-header">
      <div class="topics-header-left">
        <h2 class="topics-title">My Topics</h2>
        <span id="topic-count" class="topics-count-chip"></span>
        <div id="streak-inline" class="streak-inline" style="display:none"></div>
      </div>
      <div class="topics-header-right">
        <div class="lt-toolbar">
          <a class="lt-tool" href="irregular-verbs.html" id="lt-irregular-verbs">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              <line x1="9" y1="7" x2="15" y2="7"/>
              <line x1="9" y1="11" x2="15" y2="11"/>
              <line x1="9" y1="15" x2="12" y2="15"/>
            </svg>
            <span class="lt-tool-label" id="iv-tool-label">Irregular Verbs</span>
          </a>
        </div>
        <select id="sort-topics" class="sort-select hidden">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="name-az">Name A → Z</option>
          <option value="name-za">Name Z → A</option>
          <option value="words-desc">Most words</option>
          <option value="words-asc">Fewest words</option>
        </select>
        <div class="topics-search hidden" id="topics-search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="form-input" type="text" id="input-search-topics" placeholder="Search topics…" />
        </div>
        <button id="btn-new-topic" class="btn btn-primary btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Topic
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="topics-loading" class="text-center" style="padding:var(--sp-8)">
      <div class="spinner spinner-lg"></div>
    </div>

    <!-- Empty state -->
    <div id="topics-empty" class="empty-state hidden">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <h3>No Topics Yet</h3>
      <p>Create your first vocabulary topic to get started!</p>
      <button id="btn-new-topic-empty" class="btn btn-primary">Create a Topic</button>
    </div>

    <!-- Topic Grid -->
    <div id="topics-grid" class="topics-grid hidden"></div>
  </main>

  <!-- ===== New / Rename Topic Modal ===== -->
  <div id="modal-topic" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-topic-title">New Topic</h3>
        <button class="btn-icon" data-close-modal aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="form-topic">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="input-topic-name">Topic Name</label>
            <input class="form-input" type="text" id="input-topic-name"
                   placeholder="e.g. Business English" maxlength="80" required />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" data-close-modal>Cancel</button>
          <button type="submit" id="btn-topic-save" class="btn btn-primary">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== Firebase SDK ===== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- ===== App Script ===== -->
  <script type="module" src="js/pages/topics-page.js"></script>
</body>
</html>
